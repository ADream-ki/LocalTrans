name: Build Windows Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri\target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install LLVM
        shell: pwsh
        run: |
          choco install llvm --no-progress -y
          if (!(Test-Path "C:\Program Files\LLVM\bin\libclang.dll")) {
            throw "libclang.dll not found after LLVM installation."
          }

      - name: Set LIBCLANG_PATH
        shell: pwsh
        run: |
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare bundled MT runtime
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install ctranslate2 sentencepiece numpy pyyaml setuptools argostranslate
          @'
          import argostranslate.package
          import argostranslate.translate

          argostranslate.package.update_package_index()
          available = argostranslate.package.get_available_packages()

          required_pairs = {("zh", "en"), ("en", "zh")}
          installed = set()
          for pkg in available:
              pair = (pkg.from_code, pkg.to_code)
              if pair in required_pairs and pair not in installed:
                  path = pkg.download()
                  argostranslate.package.install_from_path(path)
                  installed.add(pair)

          missing = required_pairs - installed
          if missing:
              raise RuntimeError(f"Missing Argos packages: {missing}")
          print("Installed Argos packages:", sorted(installed))
          '@ | python -
          $py = (Get-Command python).Source
          powershell -ExecutionPolicy Bypass -File .\tools\prepare_mt_runtime.ps1 -SourcePython $py -RepoRoot $env:GITHUB_WORKSPACE

      - name: Build Tauri release
        run: npm run tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: localtrans-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/localtrans.exe
            src-tauri/target/release/bundle/**
