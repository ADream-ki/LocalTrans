name: CI Smoke

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  smoke-x86_64:
    name: smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal runtime + test deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install pytest numpy sounddevice pydantic pydantic-settings loguru rich requests

      - name: Pytest smoke (bidirectional/session/CLI)
        run: |
          python -m pytest -q tests/test_main.py tests/test_pipeline.py tests/test_gui_bidirectional_check.py

      - name: CLI smoke
        run: |
          python -m localtrans.main --help
          python -m localtrans.main run --help
          python -m localtrans.main models

  smoke-linux-aarch64:
    name: smoke (linux-aarch64, py3.11, docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Run smoke in aarch64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD:/workspace" -w /workspace \
            python:3.11-slim bash -lc "
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends libportaudio2 libsndfile1
              python -m pip install --upgrade pip
              python -m pip install -e . --no-deps
              python -m pip install pytest numpy sounddevice pydantic pydantic-settings loguru rich requests
              python -m pytest -q tests/test_main.py tests/test_pipeline.py tests/test_gui_bidirectional_check.py
              python -m localtrans.main --help
              python -m localtrans.main run --help
              python -m localtrans.main models
            "
