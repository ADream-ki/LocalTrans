name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-smoke:
    name: test+smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal runtime + test deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install pytest numpy sounddevice soundfile pydantic pydantic-settings loguru rich requests

      - name: Unit tests
        run: |
          python -m pytest -q \
            tests/test_audio_io_service.py \
            tests/test_config.py \
            tests/test_main.py

      - name: Smoke tests (pipeline/gui)
        run: |
          python -m pytest -q tests/test_main.py tests/test_pipeline.py tests/test_gui_bidirectional_check.py

      - name: CLI smoke
        run: |
          python -m localtrans.main --help
          python -m localtrans.main run --help
          python -m localtrans.main models

  package-check:
    name: package-check (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build sdist/wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist/*
          if-no-files-found: error

  pyinstaller-smoke:
    name: pyinstaller-smoke (windows)
    runs-on: windows-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install pyinstaller PySide6 numpy sounddevice soundfile pydantic pydantic-settings loguru rich requests pyttsx3 vosk argostranslate ctranslate2 sentencepiece piper-tts faster-whisper

      - name: Build executables (smoke)
        shell: powershell
        run: |
          python -m PyInstaller localtrans.spec --noconfirm --clean
          python -m PyInstaller localtrans-qml.spec --noconfirm --clean

      - name: Upload exe smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-smoke
          path: |
            dist/localtrans.exe
            dist/localtrans-qml.exe
          if-no-files-found: error
