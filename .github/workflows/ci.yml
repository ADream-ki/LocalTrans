name: CI Build

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tauri-build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set LIBCLANG_PATH
        shell: powershell
        run: |
          $candidates = @(
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm\x64\bin",
            "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Tools\Llvm\x64\bin",
            "C:\Program Files\LLVM\bin"
          )
          $found = $false
          foreach ($p in $candidates) {
            if (Test-Path (Join-Path $p "libclang.dll")) {
              "LIBCLANG_PATH=$p" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              $found = $true
              break
            }
          }
          if (-not $found) { throw "libclang.dll not found in known locations." }

      - name: Install frontend dependencies
        run: npm ci

      - name: Rust check
        working-directory: src-tauri
        run: cargo check --all-targets -p localtrans

      - name: Build app
        run: npm run tauri build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: localtrans-windows-build
          path: |
            src-tauri/target/release/localtrans.exe
            src-tauri/target/release/bundle/**
          if-no-files-found: warn
