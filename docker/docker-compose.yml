services:
  # Windows 打包环境 (需要在 Windows 上运行)
  build-windows:
    build:
      context: ..
      dockerfile: docker/Dockerfile.windows
    image: localtrans-builder:windows
    container_name: localtrans-build
    volumes:
      - ../dist:/build/dist
      - ../localtrans.spec:/build/localtrans.spec
    working_dir: /build
    command: pyinstaller localtrans.spec --noconfirm

  # Linux 打包环境 (生成 Linux 可执行文件)
  build-linux:
    build:
      context: ..
      dockerfile: docker/Dockerfile.linux
    image: localtrans-builder:linux
    container_name: localtrans-build-linux
    volumes:
      - ../dist:/build/dist
    working_dir: /build

  # 开发环境
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: localtrans-dev:latest
    container_name: localtrans-dev
    volumes:
      - ..:/app
      - localtrans-models:/root/.localtrans/models
      - localtrans-cache:/root/.localtrans/cache
    working_dir: /app
    environment:
      - PYTHONPATH=/app/src
      - LOCALTRANS_DEBUG=true
    ports:
      - "8080:8080"
    command: python -m localtrans.main run

  # 测试环境
  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: localtrans-dev:latest
    container_name: localtrans-test
    volumes:
      - ..:/app
    working_dir: /app
    command: pytest tests/ -v

volumes:
  localtrans-models:
  localtrans-cache:
