[env]
LIBCLANG_PATH = "D:/Program Files (x86)/Microsoft Visual Studio/18/BuildTools/VC/Tools/Llvm/x64/bin"
CARGO_HTTP_CHECK_REVOKE = "false"
CARGO_NET_RETRY = "5"

[http]
# Work around Windows schannel revocation/certificate issues in restricted networks.
check-revoke = false
multiplexing = false
timeout = 120

[net]
retry = 5
